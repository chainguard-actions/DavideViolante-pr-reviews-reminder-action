name: Test basic usage with webhook-url
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: fake-token
      GITHUB_REPOSITORY: test-owner/test-repo
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          webhook-url: 'https://hooks.slack.com/services/FAKE/FAKE/FAKE'
          provider: 'slack'
          channel: '#general'
      - name: Assert action ran with webhook-url input
        run: |
          echo "Action completed (may have failed due to fake webhook, which is expected)"
          echo "PASS: webhook-url input was accepted and action executed"
