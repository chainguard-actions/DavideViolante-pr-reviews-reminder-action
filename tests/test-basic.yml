name: Test basic usage with webhook-url
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: fake-token
      GITHUB_REPOSITORY: test-owner/test-repo
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          webhook-url: 'https://hooks.slack.com/services/fake/webhook/url'
          provider: 'slack'
          channel: '#general'
          github-provider-map: ''
          ignore-label: ''
      - name: Assert action ran (webhook-url input was accepted)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action is expected to either succeed or fail due to network/auth issues
          # but NOT be skipped — it must have run with the webhook-url input provided
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with webhook-url input covered"
