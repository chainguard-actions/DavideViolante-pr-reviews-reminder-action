name: Test basic usage with slack provider
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: fake-token
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          webhook-url: 'https://hooks.slack.com/services/FAKE/FAKE/FAKE'
          provider: 'slack'
          channel: '#general'
          github-provider-map: ''
          ignore-label: ''
        continue-on-error: true
      - name: Assert action ran with required inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action may fail due to fake webhook/token, but it must have been invoked
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action was invoked (outcome=$OUTCOME)"
